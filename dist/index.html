    <!-- Left-side section navigator (desktop): jump dots for the long homepage -->

    <script>
      (function () {
        /* ---------- helpers ---------- */
        function onReady(fn){ if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',fn);}else{fn();} }

        /* ---------- inject streetwear showcase before #contact ---------- */
        var tries = 0;
        function injectShowcase() {
          var anchor = document.getElementById('contact');
          var tpl = document.getElementById('fab-streetwear-tpl');
          if (anchor && tpl && !document.getElementById('streetwear-showcase')) {
            anchor.parentNode.insertBefore(tpl.content.firstElementChild.cloneNode(true), anchor);
            return true;
          }
          if (++tries < 40) setTimeout(injectShowcase, 250);
        }

        /* ---------- factory tour auto-rotate ---------- */
        function startTourRotation() {
          // React re-renders can replace this section's DOM nodes, so never
          // cache elements - re-query the live DOM on every tick.
          var i = 0, lastManual = 0;
          function liveCards() {
            var probe = document.querySelector('[code-path^="src/sections/FactoryTransparency"]');
            var section = probe && probe.closest('section');
            if (!section) return null;
            var cards = Array.prototype.slice.call(section.querySelectorAll('button'))
              .filter(function (el) { return /w-full/.test(el.className) && el.textContent.length > 10 && el.textContent.length < 400; });
            return { section: section, cards: cards };
          }
          document.addEventListener('click', function (e) {
            if (!e.isTrusted) return;
            var b = e.target.closest('button');
            if (!b || !/w-full/.test(b.className)) return;
            var lv = liveCards();
            if (lv && lv.cards.indexOf(b) !== -1) { lastManual = Date.now(); i = lv.cards.indexOf(b); }
          }, true);
          window.__fabTour = { ticks: 0, skips: 0 };
          setInterval(function () {
            var lv = liveCards();
            if (!lv || lv.cards.length < 2) { window.__fabTour.skips++; return; }
            var r = lv.section.getBoundingClientRect();
            var onScreen = r.bottom > 140 && r.top < window.innerHeight - 140;
            if (!onScreen || Date.now() - lastManual < 8000) { window.__fabTour.skips++; return; }
            i = (i + 1) % lv.cards.length;
            lv.cards[i].click();
            lastManual = 0;
            window.__fabTour.ticks++;
          }, 3000);
        }

        /* ---------- left section navigator ---------- */
        function buildSideNav() {
          if (window.innerWidth < 1200) return;
          var items = [
            ['hero', 'Top'], ['catalog', 'Products'], ['activewear-showcase', 'Activewear'],
            ['how-it-works', 'Process'], ['factory', 'Factory'], ['streetwear-showcase', 'Streetwear'],
            ['faq', 'FAQ'], ['contact', 'Get a Quote']
          ].filter(function (it) { return document.getElementById(it[0]); });
          if (items.length < 4) { setTimeout(buildSideNav, 800); return; }
          var nav = document.getElementById('fab-sidenav');
          nav.innerHTML = items.map(function (it) {
            return '<a href="#' + it[0] + '" data-sec="' + it[0] + '" title="' + it[1] + '" style="position:relative;display:block;width:10px;height:10px;border-radius:50%;background:rgba(120,130,120,.45);transition:all .25s"><span style="position:absolute;left:20px;top:50%;transform:translateY(-50%);background:#0F0F0F;color:#fff;font-size:11px;font-weight:600;letter-spacing:.5px;padding:4px 10px;border-radius:5px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s" class="fab-sn-tip">' + it[1] + '</span></a>';
          }).join('');
          nav.style.display = 'flex';
          nav.querySelectorAll('a').forEach(function (a) {
            a.addEventListener('mouseenter', function () { a.querySelector('.fab-sn-tip').style.opacity = '1'; });
            a.addEventListener('mouseleave', function () { a.querySelector('.fab-sn-tip').style.opacity = '0'; });
            a.addEventListener('click', function (e) {
              e.preventDefault();
              var t = document.getElementById(a.getAttribute('data-sec'));
              if (t) t.scrollIntoView({ behavior: 'smooth' });
            });
          });
          var obs = new IntersectionObserver(function (entries) {
            entries.forEach(function (en) {
              if (en.isIntersecting) {
                nav.querySelectorAll('a').forEach(function (a) {
                  var on = a.getAttribute('data-sec') === en.target.id;
                  a.style.background = on ? '#4A7C59' : 'rgba(120,130,120,.45)';
                  a.style.transform = on ? 'scale(1.35)' : 'scale(1)';
                });
              }
            });
          }, { threshold: 0.35 });
          items.forEach(function (it) { obs.observe(document.getElementById(it[0])); });
        }

        /* ---------- rotating collection spotlight ---------- */
        function startSpotlight() {
          try { if (sessionStorage.getItem('fabSpotDismissed')) return; } catch (e) { return; }
          var spots = [
            ['/premium-hoodies', '/images/hoodie-01-bone-oversized-embroidered.jpg', 'Premium Hoodies', '41 heavyweight designs - from $22'],
            ['/streetwear-collection', '/images/st-hoodie-oversized.jpg', 'Streetwear Collection', '29 heavyweight products'],
            ['/premium-tshirts', '/images/tshirt-01-white-boxy-blank.jpg', 'Premium T-Shirts', '22 boxy & oversized designs'],
            ['/puff-print-streetwear', '/images/puff-02-bone-hoodie.jpg', '3D Puff Print', '30 raised-graphic designs'],
            ['/soccer-kits', '/images/sc-kit-01-blue-pinstripe.jpg', 'Soccer Kits', '30 sublimated team kits'],
            ['/basketball-kits', '/images/bk-kit-01-black-gold.jpg', 'Basketball Kits', '40 uniform designs']
          ];
          var el = document.createElement('a');
          el.id = 'fab-spotlight';
          el.style.cssText = 'position:fixed;left:18px;bottom:130px;z-index:70;display:none;align-items:center;gap:12px;background:#0F0F0F;border:1px solid rgba(74,124,89,.5);border-radius:12px;padding:10px 14px 10px 10px;text-decoration:none;box-shadow:0 12px 40px rgba(0,0,0,.35);max-width:290px';
          el.innerHTML = '<img style="width:52px;height:52px;object-fit:cover;border-radius:8px" alt=""><span><span style="display:block;color:#fff;font-weight:700;font-size:13px" class="fab-sp-t"></span><span style="display:block;color:#7FBF95;font-size:11.5px;margin-top:2px" class="fab-sp-d"></span></span><span data-x style="color:rgba(255,255,255,.5);font-size:16px;padding:0 2px;line-height:1">&times;</span>';
          document.body.appendChild(el);
          el.querySelector('[data-x]').addEventListener('click', function (e) {
            e.preventDefault(); e.stopPropagation();
            el.remove();
            try { sessionStorage.setItem('fabSpotDismissed', '1'); } catch (e2) {}
          });
          var i = -1, shown = 0;
          function next() {
            if (!document.body.contains(el) || shown >= spots.length) { el.remove(); return; }
            i = (i + 1) % spots.length; shown++;
            el.href = spots[i][0];
            el.querySelector('img').src = spots[i][1];
            el.querySelector('.fab-sp-t').textContent = spots[i][2];
            el.querySelector('.fab-sp-d').textContent = spots[i][3];
            el.style.display = 'flex';
            setTimeout(function () { if (document.body.contains(el)) el.style.display = 'none'; }, 7000);
            setTimeout(next, 22000);
          }
          setTimeout(next, 14000);
        }

        onReady(function () {
          setTimeout(injectShowcase, 300);
          setTimeout(startTourRotation, 1500);
          setTimeout(buildSideNav, 1200);
          startSpotlight();
        });
      })();
    </script>

    <script>
      (function () {
        try {
          if (sessionStorage.getItem('fabPopupShown')) return;
        } catch (e) { return; }
        var el = document.getElementById('fab-popup');
        if (!el) return;
        function close() {
          el.style.display = 'none';
          document.removeEventListener('keydown', onKey);
        }
        function onKey(e) { if (e.key === 'Escape') close(); }
        setTimeout(function () {
          el.style.display = 'flex';
          try { sessionStorage.setItem('fabPopupShown', '1'); } catch (e) {}
          document.addEventListener('keydown', onKey);
        }, 6000);
        el.addEventListener('click', function (e) { if (e.target === el) close(); });
        document.getElementById('fab-popup-x').addEventListener('click', close);
        document.getElementById('fab-popup-quote').addEventListener('click', close);
        if (window.matchMedia('(max-width: 640px)').matches) {
          var grid = el.querySelector('div[role="dialog"] > div');
